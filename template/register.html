<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <title>Registro</title>
</head>
<body>

    <h1>Registro</h1>

    <div>
        <form action="/register" method="post">
            <label for="name">Nombre</label>
            <input type="text" id="name" name="name" required>

            <label for="surname1">Apellido 1</label>
            <input type="text" id="surname1" name="surname1" required>

            <label for="surname2">Apellido 2</label>
            <input type="text" id="surname2" name="surname2">

            <label for="username">Nombre de usuario</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required maxlength="72">

            <label for="date_of_birth">Fecha de nacimiento</label>
            <input type="date" id="date_of_birth" name="date_of_birth">

            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" required>

            <label for="location">Location</label>
            <input type="text" id="location" name="location">

            <button type="submit">Registrar</button>
        </form>
    </div>
</body>
</html>
