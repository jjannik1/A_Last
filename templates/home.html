{% extends "base.html" %}
{% block content %}

<h2>Feed principal</h2>

<div id="posts-container">
    {% if posts %}
        {% include 'feed_posts_partial.html' %}
    {% else %}
        <p>No hay posts disponibles para mostrar.</p>
    {% endif %}
</div>

<div style="text-align: center; margin: 30px 0;">
    <button id="load-more-btn" style="padding: 12px 24px; background-color: var(--primary, #007bff); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold;">
        Cargar más publicaciones
    </button>
</div>

{% endblock %}
