{% extends "base.html" %}
{% block content %}

<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="form-card" style="width: 100%; max-width: 450px; text-align: center; padding: 40px 30px;">
        <div style="margin-bottom: 30px;">
            <h2 style="font-size: 2rem; font-weight: 800; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">¡Bienvenido de nuevo!</h2>
            <p style="color: var(--text-muted); margin-top: 5px;">Inicia sesión para continuar</p>
        </div>

        <form method="post" style="text-align: left;">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" placeholder="Tu nombre de usuario" required>
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            {% if error %}
            <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: var(--danger); padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; text-align: center;">
                {{ error }}
            </div>
            {% endif %}

            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px; padding: 12px; font-size: 1.1rem;">Entrar a SocialApp</button>
        </form>

        <div style="margin-top: 25px; font-size: 0.95rem; color: var(--text-muted);">
            ¿No tienes cuenta? <a href="/register" style="font-weight: 600;">Regístrate aquí</a>
        </div>
    </div>
</div>

{% endblock %}
