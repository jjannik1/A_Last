services:
  nginx:
    image: nginx:latest
    container_name: social-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fastapi

  fastapi:
    build: .
    container_name: social-app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  mongodb:
    image: mongo:7
    container_name: social-mongodb
    volumes:
      - ./mongo_data:/data/db